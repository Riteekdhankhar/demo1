<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhotu Ram Polytechnic – Library Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #8B6914;
    --deep: #0A0A0F;
    --surface: #12121A;
    --surface2: #1A1A26;
    --surface3: #22223A;
    --text: #F0EDE4;
    --text-muted: #9490A0;
    --accent: #C9A84C;
    --danger: #E05555;
    --success: #4CAF7A;
    --warn: #E8A834;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── SPLASH SCREEN ─── */
  #splash {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--deep);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 1.2s ease, transform 1.2s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; transform: scale(1.04); }

  .splash-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201,168,76,0.08) 0%, transparent 70%);
  }

  .college-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 7vw, 5.5rem);
    font-weight: 700;
    text-align: center;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    opacity: 0; transform: translateY(30px);
    animation: fadeUp 1.2s cubic-bezier(.16,1,.3,1) 0.3s forwards;
  }

  .divider-line {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1.8rem auto;
    animation: expandLine 1s ease 1.4s forwards;
  }
  @keyframes expandLine { to { width: min(500px, 70vw); } }

  .library-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.2rem, 4vw, 2.4rem);
    letter-spacing: 0.5em;
    color: var(--gold);
    opacity: 0;
    animation: glowReveal 1.5s ease 2s forwards;
  }

  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
  @keyframes glowReveal { 0%{opacity:0;filter:blur(8px)} 100%{opacity:1;filter:blur(0)} }

  .enter-btn {
    margin-top: 3.5rem;
    padding: .85rem 3rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp .8s ease 3.2s forwards;
    transition: 0.3s;
  }
  .enter-btn:hover { background: var(--gold); color: var(--deep); }

  /* ─── MAIN APP ─── */
  #app { display:none; }
  #app.visible { display:block; }

  nav {
    position: sticky; top:0; z-index: 100;
    padding: 1.2rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,15,.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201,168,76,.15);
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--gold); font-weight: 700; }
  .nav-links { display:flex; gap:1.5rem; }
  .nav-link { background:none; border:none; color: var(--text-muted); cursor:pointer; font-weight:600; font-family: 'Montserrat'; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
  .nav-link.active { color: var(--gold); border-bottom: 1px solid var(--gold); }

  .panel { display:none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .panel.active { display:block; animation: panelIn .5s ease; }
  @keyframes panelIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

  .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.8rem; margin-top: 2rem; }
  .book-card { background: var(--surface); border: 1px solid rgba(201,168,76,0.1); border-radius: 8px; overflow: hidden; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
  .book-card:hover { transform: translateY(-8px); border-color: var(--gold); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
  .book-img { width:100%; aspect-ratio: 3/4; background: var(--surface3); display: flex; align-items:center; justify-content:center; }
  .book-img img { width:100%; height:100%; object-fit:cover; }
  .book-info { padding: 1.2rem; }
  .book-title { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.4rem; color: var(--text); }
  .book-author { color: var(--gold); font-size: 0.85rem; letter-spacing: 0.5px; }

  .card-box { background: var(--surface); padding: 2rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid rgba(201,168,76,0.1); }
  .form-field { margin-bottom: 1.2rem; }
  .form-field label { display:block; font-size: 0.7rem; margin-bottom: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .form-field input { width:100%; padding: 0.9rem; background: var(--surface2); border: 1px solid rgba(201,168,76,0.2); color: white; border-radius: 4px; outline: none; transition: 0.3s; }
  .form-field input:focus { border-color: var(--gold); background: var(--surface3); }
  
  .btn { padding: 0.9rem 2rem; border:none; border-radius: 4px; cursor:pointer; font-weight:700; text-transform: uppercase; transition: 0.3s; font-family: 'Montserrat'; font-size: 0.75rem; letter-spacing: 1px; }
  .btn-gold { background: var(--gold); color: black; }
  .btn-gold:hover { background: var(--gold-light); transform: translateY(-2px); }
  .btn-danger { background: rgba(224, 85, 85, 0.1); color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: white; }

  #toast { position: fixed; bottom: 30px; right: 30px; background: var(--surface2); color: var(--gold); padding: 1.2rem 2.5rem; border-left: 5px solid var(--gold); border-radius: 4px; display: none; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-weight: 600; }

  .tabs { display: flex; gap: 1rem; margin-bottom: 2.5rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 1rem; }
  .tab-btn { background: transparent; color: var(--text-muted); padding: 0.6rem 1.5rem; border: none; cursor:pointer; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; transition: 0.3s; }
  .tab-btn.active { color: var(--gold); position: relative; }
  .tab-btn.active::after { content: ''; position: absolute; bottom: -1rem; left: 0; width: 100%; height: 2px; background: var(--gold); }

  table { width:100%; border-collapse: collapse; }
  th { text-align: left; color: var(--text-muted); font-size: 0.75rem; padding: 1.2rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(201,168,76,0.15); }
  td { padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.9rem; }

  @media (max-width: 600px) {
    .nav-links { gap: 0.8rem; }
    .nav-link { font-size: 0.65rem; }
    .panel { padding: 1.2rem; }
  }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-bg"></div>
  <div class="college-name">Chhotu Ram<br>Polytechnic</div>
  <div class="divider-line"></div>
  <div class="library-word">LIBRARY</div>
  <button class="enter-btn" onclick="enterPortal()">Enter Portal</button>
</div>

<div id="toast"></div>

<div id="app">
  <nav>
    <div class="nav-logo">CRP Library</div>
    <div class="nav-links">
      <button class="nav-link active" onclick="showPanel('books', this)">📚 Books</button>
      <button class="nav-link" onclick="showPanel('admin', this)">🔐 Admin</button>
    </div>
  </nav>

  <!-- PUBLIC VIEW -->
  <div id="panel-books" class="panel active">
    <div style="text-align: center; margin-bottom: 3rem;">
        <h2 style="font-family: 'Cormorant Garamond'; font-size: 3rem; font-weight: 700;">Library Collection</h2>
        <p style="color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; font-size: 0.7rem;">Real-time Cloud Database</p>
    </div>
    <div class="books-grid" id="books-grid"></div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="panel-admin" class="panel">
    <div id="admin-login">
        <div class="card-box" style="max-width: 450px; margin: 5rem auto; text-align: center;">
            <h3 style="font-family: 'Cormorant Garamond'; font-size: 2rem; margin-bottom: 1.5rem;">Administrator Access</h3>
            <div class="form-field">
                <input type="password" id="admin-pass" placeholder="Enter Security Password" onkeydown="if(event.key==='Enter')adminLogin()">
            </div>
            <button class="btn btn-gold" style="width: 100%;" onclick="adminLogin()">Authorize</button>
        </div>
    </div>

    <div id="admin-dashboard" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2.2rem;">Control Center</h2>
            <button class="btn btn-danger" onclick="adminLogout()">Sign Out</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('tab-upload', this)">Upload Book</button>
            <button class="tab-btn" onclick="showTab('tab-manage', this)">Inventory</button>
            <button class="tab-btn" onclick="showTab('tab-students', this)">Student Registry</button>
        </div>

        <div id="tab-upload" class="tab-content active">
            <div class="card-box">
                <h3 style="margin-bottom: 1.5rem; color: var(--gold);">New Entry</h3>
                <div class="form-field">
                    <label>Cover Image</label>
                    <input type="file" id="book-img-input" accept="image/*" onchange="previewImg(this)">
                    <img id="img-preview" style="width: 120px; border-radius: 4px; margin-top: 15px; display: none; border: 1px solid var(--gold);">
                </div>
                <div class="form-field"><label>Book Title</label><input type="text" id="book-title" placeholder="e.g. Engineering Physics"></div>
                <div class="form-field"><label>Author Name</label><input type="text" id="book-author" placeholder="e.g. Dr. Satya Prakash"></div>
                <div class="form-field"><label>Category</label><input type="text" id="book-cat" placeholder="e.g. Applied Science"></div>
                <button class="btn btn-gold" onclick="uploadBook()">Deploy to Cloud</button>
            </div>
        </div>

        <div id="tab-manage" class="tab-content">
            <div class="card-box" id="manage-books-list"></div>
        </div>

        <div id="tab-students" class="tab-content">
            <div class="card-box">
                <h3 style="margin-bottom: 1.5rem; color: var(--gold);">Register Student</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-field"><input type="text" id="stu-name" placeholder="Full Name"></div>
                    <div class="form-field"><input type="text" id="stu-roll" placeholder="Roll Number"></div>
                </div>
                <button class="btn btn-gold" onclick="addStudent()">Add Record</button>
            </div>
            <div class="card-box" style="padding: 0; overflow: hidden;">
                <table>
                    <thead><tr><th>Student Name</th><th>Roll No.</th><th style="text-align: right;">Management</th></tr></thead>
                    <tbody id="students-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
  </div>
</div>

<!-- FIREBASE SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
// 1. Firebase Config (image_fbd61e.png ke anusar)
const firebaseConfig = {
  apiKey: "AIzaSyBluPCrnJVZpOU9tXcirTQDIXL9Bosqk64",
  authDomain: "crp-library.firebaseapp.com",
  databaseURL: "https://crp-library-default-rtdb.firebaseio.com",
  projectId: "crp-library",
  storageBucket: "crp-library.firebasestorage.app",
  messagingSenderId: "1072254185300",
  appId: "1:1072254185300:web:d00add38ef883dd85ae2c1"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 2. LUXURY SOUND EFFECTS ENGINE
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
function getAC() { if(!ac) ac = new AC(); return ac; }
function playTone(freq=440, type='sine', dur=0.2, vol=0.1) {
  try {
    const a = getAC(); const osc = a.createOscillator(); const g = a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    osc.start(); osc.stop(a.currentTime + dur);
  } catch(e){}
}
const chime = () => { [523, 659, 784, 1046].forEach((f,i) => setTimeout(() => playTone(f, 'sine', 0.5, 0.1), i*100)); };
const clickSound = () => playTone(800, 'triangle', 0.1, 0.05);
const errorSound = () => { playTone(200, 'sawtooth', 0.3, 0.1); playTone(150, 'sawtooth', 0.3, 0.12); };

// 3. APPLICATION STATE
let books = [];
let students = [];
let adminPassword = 'chhoturam123';
let currentImgData = null;

// 4. REAL-TIME CLOUD SYNC
db.ref('library_data').on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
        books = data.books || [];
        students = data.students || [];
        adminPassword = data.adminPassword || 'chhoturam123';
        
        renderBooks();
        renderManageBooks();
        renderStudents();
    }
});

function saveToCloud() {
    db.ref('library_data').set({ books, students, adminPassword })
      .then(() => toast("Cloud Synchronized ✨"))
      .catch(err => toast("Sync Failed ❌", "err"));
}

// 5. INTERFACE LOGIC
function enterPortal() {
    chime();
    const splash = document.getElementById('splash');
    splash.classList.add('hide');
    setTimeout(() => {
        splash.style.display = 'none';
        document.getElementById('app').classList.add('visible');
    }, 1200);
}

function showPanel(id, btn) {
    clickSound();
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    btn.classList.add('active');
}

function showTab(id, btn) {
    clickSound();
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

function previewImg(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            currentImgData = e.target.result;
            const prev = document.getElementById('img-preview');
            prev.src = currentImgData;
            prev.style.display = 'block';
            clickSound();
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function uploadBook() {
    const title = document.getElementById('book-title').value.trim();
    const author = document.getElementById('book-author').value.trim();
    const cat = document.getElementById('book-cat').value.trim();
    
    if(!title) { errorSound(); return toast("Title is required", "err"); }

    books.push({ title, author, cat, img: currentImgData, id: Date.now() });
    saveToCloud();
    chime();
    
    // Reset Inputs
    document.getElementById('book-title').value = '';
    document.getElementById('book-author').value = '';
    document.getElementById('book-cat').value = '';
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('book-img-input').value = '';
    currentImgData = null;
}

function renderBooks() {
    const grid = document.getElementById('books-grid');
    if(books.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:5rem; color:var(--text-muted);">No books available in the cloud.</div>`;
        return;
    }
    grid.innerHTML = books.map(b => `
        <div class="book-card">
            <div class="book-img">${b.img ? `<img src="${b.img}" loading="lazy">` : `<span style="opacity:0.2">NO COVER</span>`}</div>
            <div class="book-info">
                <div class="book-title">${b.title}</div>
                <div class="book-author">${b.author || 'Unknown Author'}</div>
            </div>
        </div>
    `).join('');
}

function renderManageBooks() {
    const list = document.getElementById('manage-books-list');
    if(books.length === 0) { list.innerHTML = "Inventory empty."; return; }
    list.innerHTML = books.map((b, i) => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:1.2rem; border-bottom:1px solid rgba(255,255,255,0.05);">
            <div>
                <div style="font-weight:600;">${b.title}</div>
                <div style="font-size:0.7rem; color:var(--gold);">${b.author || 'N/A'}</div>
            </div>
            <button class="btn btn-danger" style="padding:0.5rem 1rem; font-size:0.6rem;" onclick="deleteBook(${i})">Remove</button>
        </div>
    `).join('');
}

function deleteBook(i) {
    if(confirm("Permanently delete this book from cloud?")) {
        playTone(300, 'sawtooth', 0.2, 0.1);
        books.splice(i, 1);
        saveToCloud();
    }
}

function addStudent() {
    const name = document.getElementById('stu-name').value.trim();
    const roll = document.getElementById('stu-roll').value.trim();
    if(name && roll) {
        students.push({ name, roll });
        saveToCloud();
        chime();
        document.getElementById('stu-name').value = '';
        document.getElementById('stu-roll').value = '';
    } else { errorSound(); toast("Complete all fields", "err"); }
}

function renderStudents() {
    const tbody = document.getElementById('students-tbody');
    if(students.length === 0) { tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:var(--text-muted);">No students registered.</td></tr>`; return; }
    tbody.innerHTML = students.map((s, i) => `
        <tr>
            <td style="font-weight:600;">${s.name}</td>
            <td style="font-family:monospace; color:var(--gold);">${s.roll}</td>
            <td style="text-align:right;"><button class="btn btn-danger" style="padding:0.4rem 0.8rem; font-size:0.6rem;" onclick="deleteStudent(${i})">Delete</button></td>
        </tr>
    `).join('');
}

function deleteStudent(i) {
    playTone(300, 'sawtooth', 0.2, 0.1);
    students.splice(i, 1);
    saveToCloud();
}

function adminLogin() {
    const pass = document.getElementById('admin-pass').value;
    if(pass === adminPassword) {
        chime();
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-dashboard').style.display = 'block';
    } else {
        errorSound();
        toast("Access Denied: Invalid Credentials", "err");
        document.getElementById('admin-pass').value = '';
    }
}

function adminLogout() {
    clickSound();
    document.getElementById('admin-login').style.display = 'block';
    document.getElementById('admin-dashboard').style.display = 'none';
    document.getElementById('admin-pass').value = '';
}

function toast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    t.style.borderLeftColor = type === 'err' ? 'var(--danger)' : 'var(--gold)';
    setTimeout(() => t.style.display = 'none', 3500);
}
</script>
</body>
</html>
