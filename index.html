<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhotu Ram Library Portal</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #ffffff; --accent: #0071e3; --gray: #f5f5f7; --text: #1d1d1f; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; -webkit-tap-highlight-color: transparent; }
        
        #intro { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; transition: 0.8s ease; }
        .welcome { font-size: 2.5rem; font-weight: 700; opacity: 0; transform: translateY(20px); animation: fadeIn 1s forwards; text-align: center; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .main-app { display: none; padding: 20px; max-width: 500px; margin: 0 auto; min-height: 100vh; }
        .card { background: var(--gray); padding: 30px; border-radius: 24px; border: 1px solid #eee; text-align: center; margin-bottom: 20px; cursor: pointer; transition: 0.3s; }
        .card:active { transform: scale(0.95); }

        .panel { display: none; position: fixed; inset: 0; background: white; z-index: 100; overflow-y: auto; padding: 20px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        input, select, .btn-action { width: 100%; padding: 16px; margin: 10px 0; border-radius: 14px; border: 1px solid #ddd; font-size: 1rem; outline: none; }
        .btn-action { background: var(--text); color: white; border: none; font-weight: 600; cursor: pointer; }

        .book-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .book-item { background: var(--gray); padding: 10px; border-radius: 18px; text-align: center; }
        .book-item img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; }

        #face-id { position: fixed; inset: 0; background: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        .scan-frame { width: 220px; height: 220px; border: 3px solid var(--accent); border-radius: 40px; position: relative; overflow: hidden; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: var(--accent); top: 0; animation: scan 2s infinite linear; box-shadow: 0 0 15px var(--accent); }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <!-- Premium Sounds -->
    <audio id="sfx-start" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="sfx-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="sfx-success" src="https://assets.mixkit.co/active_storage/sfx/592/592-preview.mp3" preload="auto"></audio>

    <div id="intro" onclick="launch()">
        <div class="welcome">Welcome to Library</div>
        <div style="color: #888; letter-spacing: 3px; text-transform: uppercase; margin-top: 10px;">Chhotu Ram Polytechnic</div>
        <p style="margin-top: 40px; font-size: 0.8rem; color: #ccc;">TAP TO ENTER</p>
    </div>

    <div id="face-id">
        <div class="scan-frame"><video id="v" style="width:100%; height:100%; object-fit:cover; transform:scaleX(-1)" autoplay muted playsinline></video><div class="scan-line"></div></div>
        <h3 style="margin-top:20px">Authenticating...</h3>
    </div>

    <div class="main-app" id="app">
        <h1 style="text-align:center; margin-bottom:40px;">Library Portal</h1>
        <div class="card" onclick="checkAdmin()"><i class="fa-solid fa-user-shield fa-2x"></i><h3>Admin Panel</h3></div>
        <div class="card" onclick="showPanel('p-books')"><i class="fa-solid fa-book-open fa-2x"></i><h3>All Books</h3></div>

        <div id="p-books" class="panel">
            <button class="btn-action" onclick="hidePanels()">Back</button>
            <div id="public-list" class="book-grid"></div>
        </div>

        <div id="p-admin" class="panel">
            <button class="btn-action" onclick="hidePanels()">Exit Admin</button>
            <button class="btn-action" onclick="showSub('s-up')">Upload Book</button>
            <button class="btn-action" onclick="showSub('s-del')">Manage / Delete</button>
            <button class="btn-action" onclick="showSub('s-rec')">Student Records</button>
            <button class="btn-action" style="background:#34c759" onclick="enrollFace()">Link Face ID</button>

            <div id="s-up" style="display:none"><input type="text" id="bT" placeholder="Book Title"><input type="file" id="bF" accept="image/*"><button class="btn-action" onclick="saveB()">Upload</button></div>
            <div id="s-del" style="display:none"><div id="admin-list" class="book-grid"></div></div>
            <div id="s-rec" style="display:none"><input type="text" id="sN" placeholder="Student Name"><select id="sS"><option value="✔️">Present</option><option value="❌">Absent</option></select><button class="btn-action" onclick="saveR()">Add</button><div id="r-list"></div></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDDcAGrr-e6mCzl fX1Dy2_o3VNc7ZBRnl4",
            authDomain: "chhotu-ram-library.firebaseapp.com",
            projectId: "chhotu-ram-library",
            storageBucket: "chhotu-ram-library.firebasestorage.app",
            messagingSenderId: "835322109497",
            appId: "1:835322109497:web:e33499bfa92165082ef7e8",
            measurementId: "G-MN2G371KYC"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function launch() {
            document.getElementById('sfx-start').play();
            document.getElementById('intro').style.transform = 'translateY(-100%)';
            document.getElementById('app').style.display = 'block';
        }

        async function checkAdmin() {
            playSfx('sfx-click');
            if(localStorage.getItem('fE') === 'true') {
                document.getElementById('face-id').style.display = 'flex';
                const s = await navigator.mediaDevices.getUserMedia({video:true});
                document.getElementById('v').srcObject = s;
                setTimeout(() => { s.getTracks().forEach(t=>t.stop()); document.getElementById('face-id').style.display = 'none'; playSfx('sfx-success'); showPanel('p-admin'); }, 2500);
            } else { if(prompt("Password:") === "chhotu ram 2026") { playSfx('sfx-success'); showPanel('p-admin'); } }
        }

        function saveB() {
            const t = document.getElementById('bT').value, f = document.getElementById('bF').files[0];
            if(t && f) { const r = new FileReader(); r.onload = (e) => { db.ref('books').push({t, i: e.target.result}); playSfx('sfx-success'); alert("Synced!"); }; r.readAsDataURL(f); }
        }

        db.ref('books').on('value', snap => {
            const data = snap.val(); let h = "", a = "";
            for(let id in data) {
                h += `<div class="book-item"><img src="${data[id].i}"><h4>${data[id].t}</h4></div>`;
                a += `<div class="book-item"><img src="${data[id].i}"><h4>${data[id].t}</h4><button style="background:red; color:white; border:none; padding:5px; border-radius:5px" onclick="delB('${id}')">Delete</button></div>`;
            }
            document.getElementById('public-list').innerHTML = h;
            document.getElementById('admin-list').innerHTML = a;
        });

        function delB(id) { if(confirm("Delete?")) db.ref('books/'+id).remove(); }
        function saveR() { const n = document.getElementById('sN').value, m = document.getElementById('sS').value; if(n) db.ref('records').push({n, m}); }
        db.ref('records').on('value', snap => {
            const d = snap.val(); let h = "";
            for(let id in d) h += `<p style="padding:10px; border-bottom:1px solid #eee">${d[id].m} ${d[id].n}</p>`;
            document.getElementById('r-list').innerHTML = h;
        });

        function playSfx(id) { document.getElementById(id).play().catch(()=>{}); }
        function showPanel(id) { hidePanels(); document.getElementById(id).style.display = 'block'; }
        function hidePanels() { document.querySelectorAll('.panel').forEach(p => p.style.display = 'none'); }
        function showSub(id) { document.querySelectorAll('#p-admin div[id^="s-"]').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
        function enrollFace() { localStorage.setItem('fE', 'true'); playSfx('sfx-success'); alert("Face ID Linked!"); }
    </script>
</body>
</html>
