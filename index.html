<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhotu Ram Polytechnic – Library Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #8B6914;
    --deep: #0A0A0F;
    --surface: #12121A;
    --surface2: #1A1A26;
    --surface3: #22223A;
    --text: #F0EDE4;
    --text-muted: #9490A0;
    --accent: #C9A84C;
    --danger: #E05555;
    --success: #4CAF7A;
    --warn: #E8A834;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── SPLASH SCREEN ─── */
  #splash {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--deep);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 1.2s ease, transform 1.2s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; transform: scale(1.04); }

  .splash-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201,168,76,0.08) 0%, transparent 70%);
  }

  .college-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 7vw, 5.5rem);
    font-weight: 700;
    text-align: center;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    opacity: 0; transform: translateY(30px);
    animation: fadeUp 1.2s cubic-bezier(.16,1,.3,1) 0.3s forwards;
  }

  .divider-line {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1.8rem auto;
    animation: expandLine 1s ease 1.4s forwards;
  }
  @keyframes expandLine { to { width: min(500px, 70vw); } }

  .library-word {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.2rem, 4vw, 2.4rem);
    letter-spacing: 0.5em;
    color: var(--gold);
    opacity: 0;
    animation: glowReveal 1.5s ease 2s forwards;
  }

  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
  @keyframes glowReveal { 0%{opacity:0;filter:blur(8px)} 100%{opacity:1;filter:blur(0)} }

  .enter-btn {
    margin-top: 3.5rem;
    padding: .85rem 3rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp .8s ease 3.2s forwards;
    transition: 0.3s;
    position: relative;
    z-index: 10;
  }
  .enter-btn:hover { background: var(--gold); color: var(--deep); }

  /* ─── MAIN APP ─── */
  #app { display:none; }
  #app.visible { display:block; }

  nav {
    position: sticky; top:0; z-index: 100;
    padding: 1.2rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,15,.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201,168,76,.15);
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--gold); font-weight: 700; }
  .nav-links { display:flex; gap:1.5rem; }
  .nav-link { background:none; border:none; color: var(--text-muted); cursor:pointer; font-weight:600; font-family: 'Montserrat'; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
  .nav-link.active { color: var(--gold); }

  .panel { display:none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
  .panel.active { display:block; animation: panelIn .5s ease; }
  @keyframes panelIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

  .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.8rem; margin-top: 2rem; }
  .book-card { background: var(--surface); border: 1px solid rgba(201,168,76,0.1); border-radius: 8px; overflow: hidden; transition: 0.4s; }
  .book-card:hover { transform: translateY(-8px); border-color: var(--gold); }
  .book-img { width:100%; aspect-ratio: 3/4; background: var(--surface3); display: flex; align-items:center; justify-content:center; }
  .book-img img { width:100%; height:100%; object-fit:cover; }
  .book-info { padding: 1.2rem; }
  .book-title { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 0.4rem; }
  .book-author { color: var(--gold); font-size: 0.8rem; }

  .card-box { background: var(--surface); padding: 2rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid rgba(201,168,76,0.1); }
  .form-field { margin-bottom: 1.2rem; }
  .form-field label { display:block; font-size: 0.7rem; margin-bottom: 0.5rem; color: var(--text-muted); text-transform: uppercase; }
  .form-field input { width:100%; padding: 0.85rem; background: var(--surface2); border: 1px solid rgba(201,168,76,0.2); color: white; border-radius: 4px; outline: none; }
  
  .btn { padding: 0.85rem 2rem; border:none; border-radius: 4px; cursor:pointer; font-weight:700; text-transform: uppercase; transition: 0.3s; font-size: 0.75rem; }
  .btn-gold { background: var(--gold); color: black; }
  .btn-danger { background: rgba(224, 85, 85, 0.15); color: var(--danger); border: 1px solid var(--danger); }

  #toast { position: fixed; bottom: 30px; right: 30px; background: var(--surface2); padding: 1.2rem 2.5rem; border-left: 5px solid var(--gold); border-radius: 4px; display: none; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

  .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; }
  .tab-btn { background: transparent; color: var(--text-muted); padding: 0.5rem 1.5rem; border: none; cursor:pointer; font-weight: 600; text-transform: uppercase; font-size: 0.7rem; }
  .tab-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-bg"></div>
  <div class="college-name">Chhotu Ram<br>Polytechnic</div>
  <div class="divider-line"></div>
  <div class="library-word">LIBRARY</div>
  <button class="enter-btn" onclick="enterPortal()">Enter Portal</button>
</div>

<div id="toast"></div>

<div id="app">
  <nav>
    <div class="nav-logo">CRP Library</div>
    <div class="nav-links">
      <button class="nav-link active" onclick="showPanel('books', this)">📚 Books</button>
      <button class="nav-link" onclick="showPanel('admin', this)">🔐 Admin</button>
    </div>
  </nav>

  <div id="panel-books" class="panel active">
    <h2 style="font-family: 'Cormorant Garamond'; font-size: 2.5rem; text-align: center; margin-bottom: 2rem;">Library Collection</h2>
    <div class="books-grid" id="books-grid"></div>
  </div>

  <div id="panel-admin" class="panel">
    <div id="admin-login">
        <div class="card-box" style="max-width: 400px; margin: 5rem auto; text-align: center;">
            <h3 style="margin-bottom: 1.5rem;">Admin Login</h3>
            <div class="form-field">
                <input type="password" id="admin-pass" placeholder="Password">
            </div>
            <button class="btn btn-gold" style="width: 100%;" onclick="adminLogin()">Login</button>
        </div>
    </div>

    <div id="admin-dashboard" style="display: none;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
            <h2>Admin Control</h2>
            <button class="btn btn-danger" onclick="adminLogout()">Sign Out</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('tab-upload', this)">Upload</button>
            <button class="tab-btn" onclick="showTab('tab-manage', this)">Manage</button>
            <button class="tab-btn" onclick="showTab('tab-students', this)">Students</button>
        </div>

        <div id="tab-upload" class="tab-content active">
            <div class="card-box">
                <h3>Add Book</h3>
                <div class="form-field">
                    <label>Cover Image</label>
                    <input type="file" id="book-img-input" accept="image/*" onchange="previewImg(this)">
                    <img id="img-preview" style="width: 100px; margin-top: 10px; display: none;">
                </div>
                <div class="form-field"><label>Title</label><input type="text" id="book-title"></div>
                <div class="form-field"><label>Author</label><input type="text" id="book-author"></div>
                <button class="btn btn-gold" onclick="uploadBook()">Push to Cloud</button>
            </div>
        </div>

        <div id="tab-manage" class="tab-content">
            <div class="card-box" id="manage-books-list"></div>
        </div>

        <div id="tab-students" class="tab-content">
            <div class="card-box">
                <h3>Register Student</h3>
                <div class="form-field"><input type="text" id="stu-name" placeholder="Name"></div>
                <div class="form-field"><input type="text" id="stu-roll" placeholder="Roll No"></div>
                <button class="btn btn-gold" onclick="addStudent()">Add Student</button>
            </div>
            <div class="card-box">
                <table style="width: 100%; text-align: left;">
                    <thead><tr><th>Name</th><th>Roll No</th><th>Action</th></tr></thead>
                    <tbody id="students-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
  </div>
</div>

<!-- FIREBASE LIBRARIES -->
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
// 1. Firebase Config (image_fbd61e.png ke anusar)
const firebaseConfig = {
  apiKey: "AIzaSyBluPCrnJVZpOU9tXcirTQDIXL9Bosqk64",
  authDomain: "crp-library.firebaseapp.com",
  databaseURL: "https://crp-library-default-rtdb.firebaseio.com",
  projectId: "crp-library",
  storageBucket: "crp-library.firebasestorage.app",
  messagingSenderId: "1072254185300",
  appId: "1:1072254185300:web:d00add38ef883dd85ae2c1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 2. LUXURY SOUND ENGINE
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
function getAC() { if(!ac) ac = new AC(); return ac; }
function playTone(freq=440, type='sine', dur=0.2, vol=0.1) {
  try {
    const a = getAC(); const osc = a.createOscillator(); const g = a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.type = type; osc.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    osc.start(); osc.stop(a.currentTime + dur);
  } catch(e){}
}
const chime = () => { [523, 659, 784].forEach((f,i) => setTimeout(() => playTone(f, 'sine', 0.4), i*100)); };

// 3. STATE
let books = []; let students = []; let adminPassword = 'chhoturam123'; let currentImgData = null;

// 4. CLOUD SYNC
db.ref('library_data').on('value', (s) => {
    const data = s.val();
    if(data) {
        books = data.books || [];
        students = data.students || [];
        renderBooks(); renderManageBooks(); renderStudents();
    }
});

function sync() {
    db.ref('library_data').set({ books, students, adminPassword }).then(() => {
        chime(); toast("Cloud Synced ✨");
    });
}

// 5. INTERFACE FUNCTIONS
function enterPortal() {
    chime();
    document.getElementById('splash').classList.add('hide');
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('app').classList.add('visible');
    }, 1000);
}

function showPanel(id, btn) {
    playTone(600, 'triangle', 0.1);
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    btn.classList.add('active');
}

function showTab(id, btn) {
    playTone(800, 'triangle', 0.1);
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}

function previewImg(input) {
    if(input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            currentImgData = e.target.result;
            document.getElementById('img-preview').src = currentImgData;
            document.getElementById('img-preview').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function uploadBook() {
    const title = document.getElementById('book-title').value;
    const author = document.getElementById('book-author').value;
    if(!title) return toast("Title Required", "err");
    books.push({ title, author, img: currentImgData, id: Date.now() });
    sync();
    document.getElementById('book-title').value = '';
    document.getElementById('book-author').value = '';
    document.getElementById('img-preview').style.display = 'none';
}

function renderBooks() {
    document.getElementById('books-grid').innerHTML = books.map(b => `
        <div class="book-card">
            <div class="book-img">${b.img ? `<img src="${b.img}">` : 'No Cover'}</div>
            <div class="book-info"><div class="book-title">${b.title}</div><div class="book-author">${b.author}</div></div>
        </div>
    `).join('');
}

function renderManageBooks() {
    document.getElementById('manage-books-list').innerHTML = books.map((b,i) => `
        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;">
            <span>${b.title}</span><button class="btn btn-danger" onclick="deleteBook(${i})">Delete</button>
        </div>
    `).join('');
}

function deleteBook(i) { books.splice(i,1); sync(); }

function addStudent() {
    const name = document.getElementById('stu-name').value;
    const roll = document.getElementById('stu-roll').value;
    if(name && roll) { students.push({name, roll}); sync(); }
}

function renderStudents() {
    document.getElementById('students-tbody').innerHTML = students.map((s,i) => `
        <tr><td>${s.name}</td><td>${s.roll}</td><td><button onclick="delStu(${i})">X</button></td></tr>
    `).join('');
}
function delStu(i) { students.splice(i,1); sync(); }

function adminLogin() {
    if(document.getElementById('admin-pass').value === adminPassword) {
        chime();
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-dashboard').style.display = 'block';
    } else { playTone(200, 'sawtooth', 0.4); toast("Wrong Password", "err"); }
}

function adminLogout() { location.reload(); }

function toast(m, t) {
    const el = document.getElementById('toast');
    el.textContent = m; el.style.display = 'block';
    el.style.borderLeftColor = t === 'err' ? 'red' : 'var(--gold)';
    setTimeout(() => el.style.display = 'none', 3000);
}
</script>
</body>
</html>
