<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chhotu Ram Polytechnic – Library Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Jost:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* Keeping your original styling exactly as provided */
:root {
  --cream: #f5efe6; --beige: #e8ddd0; --warm: #d4c5b0; --gold: #b8965a;
  --gold-light: #d4aa6e; --brown: #6b4f35; --dark: #2c1f14; --text: #3a2e24;
  --text-light: #7a6a58; --white: #fdfaf6; --shadow: rgba(44,31,20,0.12);
  --shadow-deep: rgba(44,31,20,0.25); --border: rgba(184,150,90,0.3);
  --success: #4a7c59; --danger: #8b3a3a; --info: #3a5f7a;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; min-height: 100vh; }
.page { display: none; min-height: 100vh; animation: pageFadeIn 0.6s ease forwards; }
.page.active { display: flex; flex-direction: column; }
@keyframes pageFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
#loading-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.8s ease; }
#loading-screen.fade-out { opacity: 0; pointer-events: none; }
.loader-ring { width: 60px; height: 60px; border: 3px solid rgba(184,150,90,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#landing { background: linear-gradient(145deg, #f5efe6 0%, #e8ddd0 40%, #d4c5b0 100%); align-items: center; justify-content: center; text-align: center; cursor: pointer; position: relative; overflow: hidden; }
#landing::after { content: ''; position: absolute; top: 30px; left: 30px; right: 30px; bottom: 30px; border: 1px solid rgba(184,150,90,0.25); pointer-events: none; }
.college-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.4rem, 7vw, 7rem); font-weight: 700; color: var(--dark); line-height: 1.05; letter-spacing: 0.04em; }
.college-name .word { display: inline-block; opacity: 0; transform: translateY(80px); transition: 0.6s ease; margin: 0 0.15em; }
.college-name .word.visible { opacity: 1; transform: translateY(0); }
.library-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1.2rem, 3.5vw, 2.8rem); color: var(--gold); letter-spacing: 0.25em; text-transform: uppercase; margin-top: 0.5rem; opacity: 0; transition: 0.8s ease; }
.library-title.visible { opacity: 1; transform: translateY(0); }
#options { background: linear-gradient(145deg, #f5efe6, #e8ddd0); align-items: center; justify-content: center; flex-direction: column; gap: 2.5rem; padding: 2rem; }
.option-card { background: var(--white); border: 1px solid var(--border); border-radius: 4px; padding: 2.5rem 3rem; text-align: center; cursor: pointer; width: 220px; transition: 0.35s ease; box-shadow: 0 4px 24px var(--shadow); }
.option-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px var(--shadow-deep); }
.page-header { background: var(--dark); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; }
.page-header h1 { font-family: 'Cormorant Garamond', serif; color: var(--white); font-size: 1.5rem; flex: 1; }
.table-wrap { overflow-x: auto; background: var(--white); border: 1px solid var(--border); border-radius: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
thead th { padding: 0.9rem 1rem; text-align: left; color: var(--gold); background: var(--dark); text-transform: uppercase; font-size: 0.78rem; }
td { padding: 0.85rem 1rem; border-bottom: 1px solid rgba(184,150,90,0.1); }
.btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--dark); padding: 0.6rem 1.3rem; border: none; border-radius: 3px; cursor: pointer; font-weight: 500; }
.form-card { background: var(--white); border: 1px solid var(--border); padding: 2rem; border-radius: 4px; width: 100%; margin-bottom: 1.5rem; }
.admin-nav { background: var(--dark); padding: 1rem 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
.nav-tab { background: transparent; border: 1px solid transparent; color: rgba(245,239,230,0.6); padding: 0.5rem 1rem; cursor: pointer; }
.nav-tab.active { color: var(--gold); border-color: var(--gold); }
.admin-tab-content { display: none; padding: 2rem; }
.admin-tab-content.active { display: block; }
.toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
.toast { background: var(--dark); color: white; padding: 0.75rem 1.25rem; border-left: 3px solid var(--gold); margin-top: 5px; }
.file-upload-area { border: 2px dashed var(--border); padding: 2rem; text-align: center; cursor: pointer; background: rgba(184,150,90,0.03); }
</style>
</head>
<body>

<div id="loading-screen"><div class="loader-ring"></div></div>
<div class="toast-container" id="toast-container"></div>

<!-- PAGE 1: LANDING -->
<div id="landing" class="page" onclick="handleLandingTap()">
  <div class="landing-inner">
    <div class="college-name" id="college-name">
      <span class="word">CHHOTU</span><span class="word">RAM</span><span class="word">POLYTECHNIC</span>
    </div>
    <div class="library-title" id="library-title">Library</div>
    <div style="width:80px; height:2px; background:var(--gold); margin:1.5rem auto;"></div>
    <p style="text-transform:uppercase; letter-spacing:0.2em; color:var(--text-light); font-size:0.8rem;">✦ Tap to continue ✦</p>
  </div>
</div>

<!-- PAGE 2: OPTIONS -->
<div id="options" class="page">
  <div class="option-cards">
    <div class="option-card" onclick="showPage('admin')"><i class="fas fa-shield-alt"></i><h3>Admin Panel</h3></div>
    <div class="option-card" onclick="showPage('books')"><i class="fas fa-book-open"></i><h3>Browse Books</h3></div>
  </div>
</div>

<!-- PAGE 3: BROWSE BOOKS -->
<div id="books" class="page">
  <div class="page-header">
    <button class="btn-primary" onclick="showPage('options')">← Back</button>
    <h1>Library <span>Collection</span></h1>
  </div>
  <div class="page-content">
    <input type="text" id="books-search" placeholder="Search books..." oninput="renderBooksTable()" style="width:100%; padding:10px; margin-bottom:20px;">
    <div class="table-wrap"><table id="books-table"><thead><tr><th>Acc No</th><th>Title</th><th>Author</th><th>Qty</th></tr></thead><tbody id="books-tbody"></tbody></table></div>
  </div>
</div>

<!-- PAGE 4: ADMIN -->
<div id="admin" class="page">
  <div class="page-header">
    <button class="btn-primary" onclick="adminLogout()">Logout</button>
    <h1>Admin <span>Dashboard</span></h1>
  </div>

  <div id="admin-login-wrap" style="padding:50px; text-align:center;">
    <input type="password" id="admin-password" placeholder="Admin Password" style="padding:10px;">
    <button class="btn-primary" onclick="adminLogin()">Login</button>
  </div>

  <div id="admin-dashboard" style="display:none;">
    <div class="admin-nav">
      <button class="nav-tab active" onclick="switchAdminTab('add-books',this)">Add Books</button>
      <button class="nav-tab" onclick="switchAdminTab('issue-book',this)">Issue Book</button>
      <button class="nav-tab" onclick="switchAdminTab('students',this)">Students</button>
    </div>

    <!-- TAB: ADD BOOKS -->
    <div id="tab-add-books" class="admin-tab-content active">
      <div class="form-card">
        <h3>Manual Entry</h3>
        <input type="text" id="ab-accno" placeholder="Acc No"><input type="text" id="ab-title" placeholder="Title">
        <button class="btn-primary" onclick="addBook()">Add Book</button>
      </div>
      <div class="form-card">
        <h3>Excel Import</h3>
        <div class="file-upload-area" onclick="document.getElementById('book-file').click()">
          <i class="fas fa-file-excel"></i><p>Upload Books File</p>
          <input type="file" id="book-file" accept=".xlsx, .csv" style="display:none" onchange="handleExcel(event, 'books')">
        </div>
      </div>
    </div>

    <!-- TAB: ISSUE BOOK -->
    <div id="tab-issue-book" class="admin-tab-content">
      <div class="form-card">
        <input type="text" id="ib-roll" placeholder="Roll No"><input type="text" id="ib-book" placeholder="Book Title">
        <button class="btn-primary" onclick="issueBook()">Issue</button>
      </div>
      <div class="form-card">
        <h3>Bulk Issue (Upload)</h3>
        <div class="file-upload-area" onclick="document.getElementById('issue-file').click()">
            <i class="fas fa-upload"></i><p>Upload Issues File</p>
            <input type="file" id="issue-file" accept=".xlsx, .csv" style="display:none" onchange="handleExcel(event, 'issued')">
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>Roll</th><th>Book</th><th>Action</th></tr></thead><tbody id="issued-tbody"></tbody></table></div>
    </div>

    <!-- TAB: STUDENTS -->
    <div id="tab-students" class="admin-tab-content">
        <div class="form-card">
            <h3>Student Bulk Import</h3>
            <div class="file-upload-area" onclick="document.getElementById('stu-file').click()">
                <i class="fas fa-users"></i><p>Upload Student List</p>
                <input type="file" id="stu-file" accept=".xlsx, .csv" style="display:none" onchange="handleExcel(event, 'students')">
            </div>
        </div>
        <div class="table-wrap"><table id="students-table"><thead><tr><th>Roll No</th><th>Name</th></tr></thead><tbody id="students-tbody"></tbody></table></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // FIREBASE CONFIG (Syncing to crp-library-e47e6)
  const firebaseConfig = {
    apiKey: "AIzaSyDtMEGg6jmGTTgfkq_TQXFq0YmCf0L82J4",
    authDomain: "crp-library-e47e6.firebaseapp.com",
    databaseURL: "https://crp-library-e47e6-default-rtdb.firebaseio.com",
    projectId: "crp-library-e47e6",
    storageBucket: "crp-library-e47e6.firebasestorage.app",
    messagingSenderId: "661984043187",
    appId: "1:661984043187:web:d3874e4168c4638849d0c6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Global state for real-time tables
  window.db_books = [];
  window.db_students = [];
  window.db_issued = [];

  // Real-time Cloud Listeners
  onValue(ref(db, 'library/books'), (snapshot) => {
    const data = snapshot.val();
    window.db_books = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
    renderBooksTable();
  });

  onValue(ref(db, 'library/students'), (snapshot) => {
    const data = snapshot.val();
    window.db_students = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
    renderStudentsTable();
  });

  onValue(ref(db, 'library/issued'), (snapshot) => {
    const data = snapshot.val();
    window.db_issued = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
    renderIssuedTable();
  });

  // Global Functions (Attached to window so your HTML can see them)
  window.addBook = () => {
    const acc = document.getElementById('ab-accno').value;
    const title = document.getElementById('ab-title').value;
    if(!title) return;
    push(ref(db, 'library/books'), { accno: acc, title: title, qty: 1 });
    showToast("Book Saved to Cloud");
  };

  window.issueBook = () => {
    const roll = document.getElementById('ib-roll').value;
    const book = document.getElementById('ib-book').value;
    push(ref(db, 'library/issued'), { rollno: roll, title: book, status: 'Issued' });
    showToast("Issue Recorded");
  };

  window.handleExcel = (e, targetPath) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (ev) => {
      const workbook = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
      const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
      json.forEach(row => {
        let data = {};
        if(targetPath === 'books') {
            data = { accno: row["ACC.NO."] || row["acc"], title: row["TITLE"] || row["title"], author: row["AUTHOR"] || "" };
        } else if(targetPath === 'students') {
            data = { rollno: row["Roll No"] || row["roll"], name: row["Name"] || row["name"] };
        } else {
            data = { rollno: row["Roll No"], title: row["Book"], status: 'Issued' };
        }
        push(ref(db, `library/${targetPath}`), data);
      });
      showToast("Sync Complete!");
    };
    reader.readAsArrayBuffer(file);
  };

  window.deleteItem = (path, id) => remove(ref(db, `library/${path}/${id}`));

  // UI Navigation
  window.showPage = (id) => { 
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };

  window.handleLandingTap = () => {
    document.getElementById('landing').style.display = 'none';
    window.showPage('options');
  };

  window.adminLogin = () => {
    if(document.getElementById('admin-password').value === 'chhoturam2026') {
        document.getElementById('admin-login-wrap').style.display = 'none';
        document.getElementById('admin-dashboard').style.display = 'block';
    }
  };

  window.switchAdminTab = (tab, btn) => {
    document.querySelectorAll('.admin-tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    btn.classList.add('active');
  };

  function renderBooksTable() {
    const tbody = document.getElementById('books-tbody');
    tbody.innerHTML = window.db_books.map(b => `<tr><td>${b.accno}</td><td>${b.title}</td><td>${b.author || '-'}</td><td>${b.qty || 1}</td></tr>`).join('');
  }

  function renderStudentsTable() {
    const tbody = document.getElementById('students-tbody');
    tbody.innerHTML = window.db_students.map(s => `<tr><td>${s.rollno}</td><td>${s.name}</td></tr>`).join('');
  }

  function renderIssuedTable() {
    const tbody = document.getElementById('issued-tbody');
    tbody.innerHTML = window.db_issued.map(i => `<tr><td>${i.rollno}</td><td>${i.title}</td><td><button onclick="deleteItem('issued','${i.id}')">Return</button></td></tr>`).join('');
  }

  window.showToast = (msg) => {
    const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 3000);
  };

  // Start animations
  setTimeout(() => {
    document.getElementById('loading-screen').classList.add('fade-out');
    document.querySelectorAll('.word').forEach((w, i) => setTimeout(() => w.classList.add('visible'), i * 300));
    setTimeout(() => document.getElementById('library-title').classList.add('visible'), 1000);
  }, 1000);
</script>
</body>
</html>
